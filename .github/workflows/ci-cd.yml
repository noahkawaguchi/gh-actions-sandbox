name: CI/CD

permissions: { contents: read }

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch: {}

jobs:
  format-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - &checkout
        uses: actions/checkout@v6
        with: { persist-credentials: false }

      - &nix-install
        name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35

      - &nix-cache
        name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: >-
            nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
          # Purge matching prefixes last accessed more than 7 days ago
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-
          purge-last-accessed: P7D

      - name: Check formatting
        run: nix develop --command cargo fmt --all --check

  lint:
    strategy:
      fail-fast: false
      matrix: { os: [ubuntu-24.04-arm, ubuntu-24.04, macos-26] }
    runs-on: ${{ matrix.os }}

    steps:
      - *checkout
      - *nix-install
      - *nix-cache

      # Load the flake's devShell environment so rust-cache finds the correct rustc version
      - &nix-develop
        name: Load `nix develop` devShell
        uses: nicknovitski/nix-develop@v1

      - &rust-cache
        name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Lint with Clippy
        run: cargo clippy --workspace --all-targets -- --deny warnings

  spell-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - *checkout
      - *nix-install
      - *nix-cache
      - name: Check spelling
        run: nix develop --command git ls-files -z | xargs -0 codebook-lsp lint

  test:
    strategy:
      fail-fast: false
      # Exclude macOS because Docker doesn't work on M1 runners
      matrix: { os: [ubuntu-24.04-arm, ubuntu-24.04] }
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:18.4-alpine3.23 # Should match the tag in the `justfile`
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: [5432:5432]

    steps:
      - *checkout
      - *nix-install
      - *nix-cache
      - *nix-develop
      - *rust-cache
      - name: Run tests
        run: cargo test --workspace --all-targets
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db

  # Always builds the Docker image (with caching), but only pushes it to GHCR if the workflow was
  # triggered by a push to main. Publishes both a commit hash tag and a latest tag.
  container-image:
    runs-on: ubuntu-24.04-arm
    permissions: { packages: write }
    needs: [format-check, lint, spell-check, test]

    steps:
      - uses: docker/setup-buildx-action@v3 # Necessary for caching in build-push-action

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          # Only push the image when pushing to main
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
